<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logic Simulator | Fullscreen</title>
    <style>
      /* Убираем все отступы у страницы */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden; /* Чтобы не было полос прокрутки самого сайта */
        background-color: #7fffd4; /* Твой цвет на случай загрузки */
      }

      /* Растягиваем iframe на всё доступное пространство */
      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <iframe
      src="https://circuitverse.org/simulator/embed/computer-logic-fundamentals?theme=&display_title=false&clock_time=true&fullscreen=true&zoom_in_out=true"
      name="myiframe"
      id="projectPreview"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </body>
</html>
